<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sé Roleplay</title>

<style>

body{
    margin:0;
    padding:0;
    font-family: Arial, Helvetica, sans-serif;
    background: url("https://r2.fivemanage.com/dFQ5hkzrsXTfxSd3QtBso/GIF.gif") center/cover no-repeat;
    background-size: 100% 100%;
    animation: gradient 10s ease infinite;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    background: linear-gradient(270deg,#ffffff,#ffffff,#ffffff);
    padding:40px;
    border-radius:15px;
    text-align:center;
    width:500px;
    box-shadow:0 30px 50px rgba(4, 0, 255, 0.3);
    animation: aparecer 1s ease;
}

@keyframes aparecer{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0px);
    }
}

.logo{
    width:100px;
    margin-bottom:20px;
}

.titulo{
    color:#5865F2;
    letter-spacing:5px;
    font-weight:bold;
    margin-bottom:10px;
}

.sub{
    font-size:30px;
    font-weight:900;
  color: white;
  text-shadow: 
    0 0 10px #5865F2,
    0 0 10px #5865F2,
    0 0 10px #5865F2,
    0 0 10px #5865F2;
    margin-bottom:30px;
}

.botao{
    display:inline-block;
    padding:15px 40px;
    background:#5865F2;
    color:#fff;
    font-weight:bold;
    text-decoration:none;
    border-radius:8px;
    transition:0.3s;
}

.botao:hover{
    transform:scale(1.08);
    background:#4752C4;
}

.footer{
    margin-top:20px;
    font-size:12px;
    color:#777;
}

</style>

</head>
<body>

<div class="container">

<img class="logo" src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">

<div class="titulo">ENTRE</div>

<div class="sub">
EM NOSSO DISCORD
</div>

<a class="botao" href="https://discord.gg/seroleplay" target="_blank">
    <img src="https://r2.fivemanage.com/dFQ5hkzrsXTfxSd3QtBso/LOGO4-Copia.png" alt="Entrar no Discord">
</a>

<div class="footer">
SÉ ROLEPLAY ©
</div>

</div>

</body>
</html>
